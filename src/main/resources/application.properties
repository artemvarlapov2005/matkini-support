# ── Telegram ──────────────────────────────────────────────────────────────────
telegram.bot.token=${BOT_TOKEN}
# Comma-separated Telegram user IDs, e.g. 123456789,987654321
telegram.bot.admin-ids=${ADMIN_IDS}
telegram.bot.username=${BOT_USERNAME:MatkiniSupportBot}

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/matkini_support}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.ledger=INFO
logging.level.org.hibernate.SQL=WARN
